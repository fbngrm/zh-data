- header: "grammar 1: 的 字短语 (de zì duăngũ)"
  explanation: "A 的 phrase is composed of an adjective, pronoun or verb followed by 的; the subsequent noun is often omitted if it's clear what 的 refers to."
  syntax: ""
  note: ""
  examples:
  -
    ch: 桌子上有两杯茶哪一杯是你的? 那杯大的是我的
    pinyin: Zhuīzi shàng you liăng bãi chá, nă yì bēi shì ni de? Nà bei dà de shì wo de5.
    eng: There are two cups of tea on the table, which cup is yours? That big cup is mine.
  -
    ch: 我去买一点儿吃的。
    pinyin: Wõ qù mãi yìdiănr chỉ de.
    eng: I'm going to buy a little something to eat.
- header: "grammar 1: 看 和 看见 (kàn hé kànjiàn)"
  explanation: "If the verb kàn is followed by jiàn, the result of kàn is emphasized."
  syntax: ""
  note: ""
  examples:
  -
    ch: 昨天我看见丽丽了
    pinyin: Zuótiān wo kanjiàn Lili le
    eng: I saw Lily yesterday.
  -
    ch: 你看见我的杯子了吗?你看,你的杯子在桌子上。
    pinyin: Ni kànjiàn wo de bēizi le ma? Nĩ kàn, ni de bēizi zài zhuōzi shàng.
    eng: Have you seen my cup? Look, your cup is on the table!
