- header: "grammar: 时间 状语 的位置 (shijian zhuàngyŭ de wèizhi)"
  explanation: "The time adverbial can be placed before or after the subject."
  syntax: ""
  note: ""
  examples:
  -
    ch: 我今天去北京。
    pinyin: Wo jintian qù Běijing.
    eng: I am going to Beijing today.
  -
    ch: 今天我去北京。
    pinyin: Jintiān wo qù Beijing
    eng: I am going to Beijing today.
