- header: "grammar 1: 没有 和 不 (méiyðu hé bù)"
  explanation: "(méi)you + verb indicates a situation or action that did (not) happen; you can be omitted."
  syntax: ""
  note: ""
  examples:
  -
    ch: Wõ méi (yòu) chi fàn.
    pinyin: 我没(有)吃饭。
    eng: I didn't eat.
- header: "grammar 2: 没有 和 不 (méiyðu hé bù)"
  explanation: "bù is generally used to negate a statement in present or future tense; méiyou is used in the past tense."
  syntax: ""
  note: ""
  examples:
  -
    ch: 今天我不去学校。
    pinyin: Jīntiān wõ bú qù xuéxiào .
    eng: I won't go to school today.
  -
    ch: 昨天我没去学校。
    pinyin: Zuótiān wo méi qù xuéxiào
    eng: yesterday I didn't go to school.
- header: "grammar 2: 没有 和 不 (méiyðu hé bù)"
  explanation: "The negative form of shi is búshì. The negative form of you is méiyou."
  syntax: ""
  note: ""
  examples:
  -
    ch: 我不是 学生 。
    pinyin: Wõ bú shì xuéshēng
    eng: I am not a student.
  -
    ch: 我没有 钱 。
    pinyin: Wo méiyou qián .
    eng: I don't have money.
