- header: "grammar 1: 多少 (duo1shao5)"
  explanation: "We've learnt 几before. It's used to inquire about numbers below ten"
  syntax: ""
  note: ""
  examples:
  -
    ch: 你们要几杯茶？我门要三杯茶。
    pinyin: ni3men5 yao4 ji3 bei1 cha2? wo3men5 yao4 san1 bei1 cha2.
    eng: How many cups of tea do you want? We want 3 cups of coffee.
  -
    ch: 下午多少个学生去看点影？下午二十个学生去看电影。
    pinyin: xia4wu3 duo1shao5 ge5 xue2sheng1 qu4 kan4 dian4ying3? xia4wu3 er4shi2 ge5 xue2sheng1 qu4 kan4 dian4ying3?
    eng: How many students are going to watch a movie in the afternoon? 20 students will go watch a movie in the afternoon.
- header: "grammar 2: 多少 (duo1shao5)"
  explanation: "多少钱is used to inquire about the price of something."
  syntax: ""
  note: ""
  examples:
  -
    ch: 一杯咖啡多少钱？二十四快钱。
    pinyin: yi2 bei1 ka1fei1 duo1shao5 qian2? er4shi4 kuai4 qian2.
    eng: How much is a cup of coffee? 24 RMB.
