- header: "grammar 1: 吗 (ma5)"
  explanation: "吗can be placed at the end of a declarative sentence to indicate a yes/no question."
  syntax: "Declarative sentence + 吗？"
  examples:
  -
    ch: 你是学生吗
    pinyin: ni3 shi4 xue2sheng1 ma
    eng: Are you a student?
  -
    ch: 你喜欢王老师吗
    pinyin: ni3 xi3huan Wang2 loa3shi1 ma
    eng: Do you like teacher Wang?
  note: ""
- header: "grammar 2: 吗 (ma5)"
  explanation: "How to answer yes/no question?"
  syntax: ""
  note: |
    1. You can simply use the verb in the sentence to answer! If the answer is affirmative, directly use the verb; if it's negative, use 不+verb.
    2. Respond in a whole sentence.
  examples:
  -
    ch: 你是学生吗？是。
    pinyin: Ni3 shi4 xue2sheng1 ma? shi4.
    eng: ;Are you a student? Yes.
  -
    ch: 你是学生吗？不是。
    pinyin: Ni3 shi4 xue2sheng1 ma? bu4 shi4;
    eng: Are you a student? No.
  -
    ch: 你是学生吗？我是学生。
    pinyin: ;Ni3 shi4 xue2sheng1 ma? Wo3 shi4 xue2sheng1
    eng: Are you a student? I am a student.
  -
    ch: 你是学生吗？我不是学生。
    pinyin: Ni3 shi4 xue2sheng1 ma? Wo3 bu4 shi4 xue2sheng1
    eng: Are you a student? I am not a student.
