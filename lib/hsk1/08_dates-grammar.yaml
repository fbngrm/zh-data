- header: "grammar: 想 (xiăng)"
  explanation: "想(xiăng) + verb indicates a wish or intention."
  syntax: "(不)想 + verb"
  note: ""
  examples:
  -
    ch: 她想 喝咖啡。
    pinyin: Tā xiăng hē kāfēi
    eng: She wants to drink coffee.
  -
    ch: 弟弟不想吃。
    pinyin: Didi bù xiăng chí.
    eng: The younger brother doesn't want to eat.
