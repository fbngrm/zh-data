- header: "grammar: Time point and time period"
  explanation: "Time is expressed starting from big to small units"
  syntax: ""
  note: ""
  examples:
  -
    ch: 一九九八年
    pinyin: yi1 jiu3 jiu3 ba1 nian2
    eng: The year of 1988
  -
    ch: 两年
    pinyin: liang3 nian2
    eng: 2 years
  -
    ch: 十六年
    pinyin: shi2 liu4 nian2
    eng: 16 years
  -
    ch: 一月
    pinyin: yi1yue4
    eng: January
  -
    ch: 十一月
    pinyin: shi3yi1yue4
    eng: November
  -
    ch: 一个月
    pinyin: yi2 ge5 yue4
