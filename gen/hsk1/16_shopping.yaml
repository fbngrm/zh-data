- deckname: hsk1
  tags: shopping
  sentence:
    source: 16_shopping
    chinese: 昨天我没有看见你。你去哪儿了?昨天 一个朋友来看我。我和她中午去了一个饭店吃饭。下午去买东西了。你们去哪儿买东西了? 学校 前面有一个很大的商店。那个商店里有很多好东西。你们在那个商店里买了什么?
      我买了一些衣服。她买了三个漂亮的杯子。
    pinyin: Zuótiān wo méiyěu kànjiàn ni. Ni qù năr le? Zuótiān yí ge péngyou lái
      kàn wo. Wo hé tā zhōngwů qù le yí ge fàndiàn chi fàn. Xiàwu qù mǎi dōngxi le.
      Nimen qù năr măi dongxi le? Xuéxiào qiánmiàn you yí ge hěn dà de shāngdiàn.
      Nà ge shāngdiàn lí yếu hèn duī hảo dõngxi. Nimen zài nà ge shāngdiàn lĩ măi
      le shénme? Wo măi le yìxiē yifu. Tā măi le sān gè piàoliang de bēizi.
    english: I didn't see you yesterday, where did you go? A friend visited me yesterday,
      I went to a restaurant with her to have lunch, and we went shopping in the afternoon.
      Where did you go shopping? There is a large shop in front of the school and
      it has many nice things. What did you buy in the shop? I bought some clothes
      and she bought three beautiful cups.
