- deckname: hsk1
  tags: daily-life
  sentence:
    source: 10_daily-life
    chinese: 麦克二零一七年十一月来了中国。现在他在一个学校做英语老师。他的学生都是中国人。麦克上午八点三十分去学校。中午十二点在学校吃饭。下午五点去运动。麦克星期六星期天都不去学校。他在家做饭，看书，看电影。
    pinyin: ""
    english: Mai4ke4 er4 ling2 yi1 qi1 nian2 shi2yi1yue4 lai2 le5 zhong1guo2. Xian4zai4
      ta1 zai4 yi2 ge5 xue2xioa4 zuo4 ying1yu3 lao3shi1. Ta1 de5 xue3sheng1 dou1 shi4
      zhong1guo2 ren2. Mai4ke4 shang4wu3 ba1 dian3 san1 shi2 fen1 qu4 xue2xiao4. Zhong1wu3
      shi2 er2 dian3 zai2 xue3xioa2 chi1 fan4. Xia3wu3 wu3 dian3 qu4 yun4dong4. Mai4ke4
      xing1qi1liu4 xing1qi1tian1 dou1 bu2 qu4 xue2xiao4. Ta1 zai2 jia1 zuo4 fan4,
      kan4 shu1, kan4 dian4ying3.
    englishLiteral: Mike came to China in November of 2017. He is working at a school
      as an English teacher. All his students are Chinese. Mike goes to school in
      the morning at 8:30. At noon, at 12 he eats in the school. In the afternoon
      at 5 he does exercise. Mike does not go to school on Saturdays and Sundays.
      He is at home and prepares food, reads a book, watches a movie.
  decompositions: []
  alldecompositions: []
