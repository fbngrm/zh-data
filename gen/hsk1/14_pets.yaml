- deckname: hsk1
  tags: pets
  sentence:
    source: 14_pets
    chinese: 这是我的小猫。你的小猫很 漂亮。你的小猫多大了? 我的小猫三岁了。你有小猫吗? 我没有小猫,我有狗。你看,我的狗在桌子下。你的狗几岁了?
      五岁了。
    pinyin: Zhè shì wo de xião mão. Nĭ de xião mão hěn piàoliang. Nĭ de xião mão duōdà
      le? Wă de xião mão sān suì le. Ni you xiǎo mão ma? Wo méiyou xião mão, wo you
      gou. Ni kàn, wo de gou zài zhuōzi xià. Ni de gou ji suì le? Wǔ sui le.
    english: This is my cat. Your cat is very beautiful. How old is your cat? It's
      three years old. Do you have a cat? No, I don't. I have a dog. Look, my dog
      is under the desk. How old is your dog? It's five years old.
