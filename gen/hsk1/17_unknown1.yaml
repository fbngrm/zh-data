- deckname: hsk1
  tags: unknown
  sentence:
    source: 17_unknown1
    chinese: 喂?你现在在家吗?我不在家。你在哪儿?我和小明在医院。你们在医院?小明昨天和今天都不想吃东西。我们来看医生。医生怎么说?医生说小明感冒了。他想吃水果吗?我去买一些。好买一个西瓜。明天小明能去学校吗?明天他不能去学校。
    pinyin: Wéi? Nǐ xiànzài zài jiā ma? Wõ bú zài jiā. Ni zài nă r? Wõ hé Xiăomíng
      zài yiyuàn. Nimen zài yiyuàn?Xiăomíng zuótiān hé jīntiān dõu bù xiăng chí dōngxi.
      Women lái kàn yīshēng.Yisheng zěnme shuō? Yisheng shuō Xiǎomíng gănmào le. Tā
      xiăng chỉ shuiguò ma? Wo qù mǎi yìxiē. Hǎo, měi yí ge xīguā. Míngtian Xiǎomíng
      néng qù xuéxiào ma? Míngtiān tā bù néng qù xuéxiào.
    english: Hello? Are you at home right now? No, I am not home. Where are you now?
      Xiaoming and I are at the hospital. You are at the hospital? Xiaoming didn't
      feel like eating yesterday or today, so we went to see a doctor. What did the
      doctor say? The doctor said that Xiaoming caught a cold. Does he want to eat
      some fruit? I am going to buy some. Yes, buy a watermelon. Can Xiaoming go to
      school tomorrow? No, he can't.
