- deckname: hsk1
  tags: family-life
  sentence:
    source: 15_family-life
    chinese: 王先生有一个女儿和一个儿子。这是他的女儿丽丽。丽丽现在二十岁这是他的儿子小明。小明现在十二岁。王先生买了一个大生日蛋糕。他们在一个很漂亮的饭店
      吃了饭。王先生的妻子很高兴。王先生买了一个大生日蛋糕。他们在一个很漂亮的 饭店吃了饭。我去买一些 水果。
    pinyin: Wáng xiānsheng you yí ge ni'ér hé yí ge érzi. Zhè shì tā de nữ'ér Lili.
      Lili xiànzài èrshí suì. Zhè shì tā de érzi Xiăomíng. Xiãoming xiànzài shi'èr
      sui. Wáng xiānsheng măi le yí gè dà shèngrì dàngão. Tāmen zài yí ge hěn piàoliang
      de fàndiàn chi le fàn. Wáng xiānsheng de qizi hěn gãoxìng. Wáng xiānsheng măi
      le yí ge dà shéngri dàngão Mr. Wang bought a big birthday cake. Tāmen zài yí
      ge hěn piàoliang de fàndiàn chi le fàn. wo qù mǎi yìxie shuĭguo.
    english: Mr. Wang has a daughter and a son. This is his daughter, Lili. She is
      20 years old. This is his son Xiaoming. He is 12 years old. Mr. Wang bought
      a big cake and they had dinner in a very beautiful restaurant. Mr. Wang's wife
      is very happy. They dined at a very beautiful restaurant. I'm going to buy some
      fruits.
